"$schema" = "./node_modules/wrangler/config-schema.json"

compatibility_date = "2026-07-11"

compatibility_flags = ["global_fetch_strictly_public", "nodejs_compat"]

name = "resuming-web"

main = "./sentry.server.config.ts"

[assets]
directory = "./dist"
binding = "ASSETS"

[observability]
enabled = true

[version_metadata]
binding = "CF_VERSION_METADATA"