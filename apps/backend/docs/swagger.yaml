host: localhost:5321
info:
  contact: {}
  description: API for resume building, portfolio management, and ATS scoring
  title: Resume Builder API
  version: "1.0"
paths:
  /accept-become-admin/{token}:
    get:
      description: Accepts the admin invitation using the token from the email link
        and updates the user type to admin
      parameters:
      - description: Invite token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Accept admin invitation
      tags:
      - Admin
  /admin_audit_logs:
    get:
      description: Retrieves audit logs for admin actions
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get admin audit logs
      tags:
      - Admin
  /ats-score-user-input:
    post:
      consumes:
      - multipart/form-data
      description: Extracts resume, validates it, uses user-provided job description,
        and calculates ATS score
      parameters:
      - description: Resume PDF file
        in: formData
        name: resume_file
        required: true
        type: file
      - description: Job description text
        in: formData
        name: job_desc
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ATSScoreResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: ATS score with user input
      tags:
      - ATS
  /ats-score-webscrape:
    post:
      consumes:
      - multipart/form-data
      description: Extracts resume, validates it, web scrapes job description from
        company/title, and calculates ATS score
      parameters:
      - description: Resume PDF file
        in: formData
        name: resume_file
        required: true
        type: file
      - description: Company name for job description
        in: formData
        name: company
        required: true
        type: string
      - description: Job title for job description
        in: formData
        name: job_title
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
